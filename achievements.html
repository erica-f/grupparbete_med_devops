<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dina prestationer</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/achievements.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__container">
            <a href="index.html" class="site-header__logo">FitParents</a>
            <nav>
                <ul class="site-header__nav">
                    <li><a href="training.html" class="site-header__link">Pass</a></li>
                    <li><a href="exercises.html" class="site-header__link">Övningar</a></li>
                    <li><a href="achievements.html" class="site-header__link site-header__link--active">Prestationer</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="page">
        <div class="container section">
            <div class="page-header">
                <h1 class="page-title">Dina prestationer</h1>
            </div>
            <div id="streak-banner" class="streak-banner">
                <div class="icon-circle">
                    <svg class="icon green" width="32" height="32">
                        <use href="img/icons/achievements.svg#streak-fire"></use>
                    </svg>
                </div>
                <div>
                    <span class="streak-banner__label">Hittills har du gjort</span>
                    <h2 id="user-streak" class="streak-banner__value"></h2>
                    <p id="streak-sub" class="streak-banner__sub"></p>
                </div>
            </div>
            <section class="section-container">
                <h2 class="card-title section-title">
                    <svg class="icon green" width="20" height="20">
                        <use href="img/icons/achievements.svg#award-icon"></use>
                    </svg>
                    Upplåsta utmärkelser
                </h2>
                <div id="unlocked" class="achievement-grid"></div>
            </section>
            <section class="section-container">
                <h2 class="card-title section-title">
                    <svg class="icon" width="18" height="18">
                        <use href="img/icons/achievements.svg#locked-icon"></use>
                    </svg>
                    Nästa mål
                </h2>
                <div id="locked" class="achievement-grid">
                </div>
            </section>
            <p class="section-label">Varje litet steg räknas ❤️</p>
        </div>
        <div id="achievement-modal" class="modal">
            <div class="modal-content">
                <div id="modal-icon-container"></div>
                <h2 id="modal-title"></h2>
                <p id="modal-description"></p>
                <p id="modal-date"></p>
                <div id="modal-progress-details"></div>
            </div>
        </div>
    </div>
    <script src="src/js/achievements.js" type="module"></script>
</body>
</html>
