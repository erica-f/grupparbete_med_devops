<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens pass</title>
    <link rel="stylesheet" href="src/css/training.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <section class="page">
        <section class="container section">
            <section id="filter">
                <div class="btn--secondary"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-arrow-left">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg></div>
                <!-- <div class="filter-dropdown">
                    <button class="filter-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-settings2">
                            <path d="M20 7h-9"></path>
                            <path d="M14 17H5"></path>
                            <circle cx="17" cy="17" r="3"></circle>
                            <circle cx="7" cy="7" r="3"></circle>
                        </svg> Anpassa passet
                    </button>

                    <div id="filter-selections" class="">
                        
                    </div>
                </div> -->
            </section>
            <h1 id="headline" class="page-title">Ditt pass idag</h1>
            <section id="progress" class="progress-wrapper">
                <div id="percent-text" class="progress-label">
                    <p>0 av 6 övningar klara</p>
                    <p id="progress-percent">0%</p>
                </div>
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-done" class="progress-bar__fill">
                    </div>
                </div>
            </section>
            <section id="exercises" class="exercise exercise-card">
                <div>
                    <div class="exercise-header">
                        <h4>Exercise name</h4>
                        <p class="text-muted">Exercise description</p>
                        <p class="text-brand">Sets and reps to do</p>
                    </div>
                    <!-- <p class="text-muted">Reps done</p> -->
                    <div class="rep-set">
                        <label for="set">Avklarade set</label> <br>
                        <input type="number" id="set" name="set" min="0" class="rep-input">
                        <!-- <input type="number" id="reps" name="reps" min="0" class="rep-input"> -->
                        <!-- <label for="reps">Gjorda reps</label> -->
                    </div>
                </div>
                <div class="exercise-right">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="completed" name="completed" class="completed">
                        <label for="completed">Klar</label>
                    </div>
                    <div class="exchange-exercise">
                        <button id="exercise-1" class="exchange-btn">Byt ut övning</button>
                        <div id="exchange-options-1" class="exchange">
                            <p>Övning 1</p>
                            <p>Övning 2</p>
                            <p>Övning 3</p>
                            <p>Övning 4</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="complete-training">
                <button class="btn btn--primary">Avsluta passet</button>
            </section>
        </section>
    </section>
    <script src="src/js/training.js"></script>
</body>

</html>
